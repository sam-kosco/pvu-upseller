name: Generate PVU Upsell Document

on:
  workflow_dispatch:
    inputs:
      submission_id:
        description: "JotForm submission ID (payload JSON already saved to SharePoint)"
        required: true
        type: string

jobs:
  generate-document:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install \
            reportlab \
            pillow \
            requests \
            anthropic \
            numpy

      - name: Install Node.js dependencies
        run: npm install docx

      - name: Generate upsell PDF and upload to SharePoint
        env:
          NODE_PATH: ${{ github.workspace }}/node_modules:/usr/local/lib/node_modules
          TENANT_ID:         ${{ secrets.TENANT_ID }}
          CLIENT_ID:         ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET:     ${{ secrets.CLIENT_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUBMISSION_ID:     ${{ inputs.submission_id }}
        run: python main.py
